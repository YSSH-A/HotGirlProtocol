window.runImport = async function() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = '导入中...';
  log.textContent = '';

  let ok = 0, fail = 0;
  for (const rec of HISTORY) {
    const hasData = Object.values(rec).slice(1).some(p =>
      Object.values(p).some(v => v && v !== '')
    );
    if (!hasData) continue;
    try {
      await set(ref(db, `records/${rec.date}`), {
        pafu: rec.pafu,
        keke: rec.keke,
        xuan: rec.xuan
      });
      ok++;
      log.innerHTML += `<span class="ok">✓ ${rec.date}</span>\n`;
    } catch(e) {
      fail++;
      log.innerHTML += `<span class="err">✗ ${rec.date}: ${e.message}</span>\n`;
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 30));
  }
  btn.textContent = `完成！成功 ${ok} 条${fail ? '，失败 ' + fail + ' 条' : ''}`;
  log.innerHTML += `\n<span class="ok">🎉 导入完成！可以关掉这个页面了。</span>`;
};
